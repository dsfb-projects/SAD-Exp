services:
  - type: web
    name: sad-exp
    runtime: python
    plan: free
    buildCommand: >
      pip install -r backend/requirements.txt &&
      cd frontend && npm install && npm run build
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 backend.app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sad-exp-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: sad-exp-db
    databaseName: sad_exp
    user: sad_exp_user
    plan: free
